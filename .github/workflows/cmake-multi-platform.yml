name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows / MSYS2 UCRT64 / Qt 6 / Debug
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-clang-tools-extra

      - name: Configure
        run: cmake --preset windows-ucrt64-debug

      - name: Format check
        run: cmake --build --preset build-ucrt64-debug --target format-check

      - name: Build
        run: cmake --build --preset build-ucrt64-debug

      - name: Test
        run: ctest --preset test-ucrt64-debug --output-on-failure
